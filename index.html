<!DOCTYPE html>
<html>
<head>
  <title>Minima Lottery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎰 Minima Lottery</h1>

<div class="card">
  <p>Ticket Price: <b>1 MINIMA</b></p>
  <button onclick="buyTicket()">Buy Ticket</button>
</div>

<div class="card">
  <button onclick="drawWinner()">Draw Winner</button>
  <p id="winner"></p>
</div>

<div class="card">
  <h3>Entries</h3>
  <ul id="entries"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
