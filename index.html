<!DOCTYPE html>
<html>
<head>
  <title>Minima Lottery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎰 Minima Lottery</h1>

<div class="card">
  <p>Ticket Price: <b>1 MINIMA</b></p>
  <button onclick="buyTicket()">Buy Ticket</button>
</div>

<div class="card">
  <button onclick="drawWinner()">Draw Winner</button>
  <p id="winner"></p>
</div>

<div class="card">
  <h3>Entries</h3>
  <ul id="entries"></ul>
</div>

<!-- 🔍 Debug section (IMPORTANT) -->
<div class="card">
  <h3>Debug</h3>
  <p id="status">Status: Not connected</p>
</div>

<script src="app.js"></script>

<script>
// ===============================
// 🔌 Check MiniMask Injection
// ===============================
setTimeout(() => {
  try {
    document.getElementById("status").innerText =
      "Status: Page Loaded (MiniMask may be active)";
      
    console.log("Page loaded. Ready to send requests.");

  } catch (e) {
    console.error(e);
  }
}, 500);
</script>

</body>
</html>
